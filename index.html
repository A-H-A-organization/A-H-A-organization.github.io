	a {
		color: #14C549;
		text-decoration: none;
		animation: fadePulse 4s infinite;
		transition: opacity 2.0s;
	}
	a:hover {
		animation: none;
		transition: opacity: 1

	@keyframes fadePulse {
		0%   { opacity: 0.35; }
		50%  { opacity: 1; }
		100% { opacity: 0.3; }
	}
